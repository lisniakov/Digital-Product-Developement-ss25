name: Android CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # 1. Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Sets up the Java Development Kit (JDK) environment
      #    Modern Android projects need JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. IMPORTANT: Grants execute permission to the gradlew script
      #    This is a common point of failure
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Runs the build command to make sure the app compiles
      - name: Build with Gradle
        run: ./gradlew build

      # 5. Runs the unit tests to check the app's logic/functionality
      #    This is the step that "checks the functionality"
      - name: Run unit tests
        run: ./gradlew test
