name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checks-out your repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Sets up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Grant execute permission for gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. NEW STEP: Add google-services.json file from secrets
      - name: Add google-services.json
        # This command takes the secret and writes it to the file path the build expects
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > app/google-services.json

      # 5. Runs the build command
      - name: Build with Gradle
        run: ./gradlew build

      # 6. Runs the unit tests
      - name: Run unit tests
        run: ./gradlew test
